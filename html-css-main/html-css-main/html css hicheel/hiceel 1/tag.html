<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <title>Миний вэбсайт</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f0f2f5;
    }
    header {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 800px;
      margin: 30px auto;
      background-color: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    h2 {
      color: #34495e;
      margin-top: 30px;
    }
    img, video {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin-top: 10px;
    }
    footer {
      background-color: #2c3e50;
      color: white;
      text-align: center;
      padding: 10px;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <header>
    <h1>Тавтай морил!</h1>
    <p>Энэ бол миний анхны вэбсайт</p>
  </header>

  <div class="container">
    <h2>📝 Бичлэг</h2>
    <p>
      Сайн байна уу? Та миний вэбсайтад зочилж байгаад баярлалаа. Энэ сайт нь текст, зураг, видео агуулсан энгийн танилцуулга юм.
      Та доорх зураг болон видеог үзэж болно.
    </p>

    <h2>📸 Зураг</h2>
    <img src="image.jpg" alt="Жишээ зураг">

    <h2>🎥 Видео</h2>
    <video controls>
      <source src="video.mp4" type="video/mp4">
      Таны хөтөч видеог дэмжихгүй байна.
    </video>
  </div>

  <footer>
    <p>© 2025 Миний вэбсайт. Бүх эрх хуулиар хамгаалагдсан.</p>
  </footer>

</body>
</html>
